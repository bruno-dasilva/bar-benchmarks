# Repo prereqs (one-time):
#   - WIF pool trusting this repo's OIDC, bound to an operator service
#     account in the bar-experiments GCP project. See
#     beyond-all-reason/bar-benchmarks docs/github-action.md.
#   - Repo variables:
#       WIF_PROVIDER       projects/.../workloadIdentityPools/.../providers/...
#       BENCH_OPERATOR_SA  bench-operator@bar-experiments.iam.gserviceaccount.com
#   - (Optional) Repo variables to control the fixed pieces of the run:
#       BENCH_BAR_CONTENT  bar-test-29871-90f4bc1
#       BENCH_COUNT        10
#
# Cost note: up to 10 benchmark runs per PR (5 scenarios × candidate+baseline,
# fewer if the operator deselects scenarios in the dispatch UI).
# At count=10, c2d-standard-16, ~8 min wall → ~$0.20 per run, ~$2 per PR.
# fightertest-* legs run 5 iterations per VM (staging paid once) to
# yield 50 data points per leg at roughly the same infra cost but ~5×
# wall time. max-run-duration is set globally to 3600s, sized for the
# longest leg.

name: bar-benchmark
run-name: bar-benchmark PR#${{ inputs.pr_number }} (${{ inputs.mode }})

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to benchmark"
        required: true
        type: string
      mode:
        description: "quick = 1 iter/VM (cheap sanity check); full = matrix iterations (5× on fightertest-*, 2x on lategame1)"
        required: false
        type: choice
        default: full
        options: [quick, full]
      count:
        description: "VMs per leg (blank = use BENCH_COUNT repo var, default 10)"
        required: false
        type: string
        default: ""
      fightertest_bots:
        description: "run fightertest-bots"
        required: false
        type: boolean
        default: true
      fightertest_aircraft:
        description: "run fightertest-aircraft"
        required: false
        type: boolean
        default: true
      fightertest_tanks:
        description: "run fightertest-tanks"
        required: false
        type: boolean
        default: true
      fightertest_pathfinding:
        description: "run fightertest-pathfinding"
        required: false
        type: boolean
        default: true
      lategame1:
        description: "run lategame1"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: read        # read the triggering workflow_run + its artifacts
  pull-requests: write # post the results comment
  id-token: write      # Workload Identity Federation

jobs:
  # ------------------------------------------------------------------
  # Resolve PR context (head SHA, base SHA, label gate) from either
  # trigger. Without this a workflow_run job has no direct PR payload.
  # ------------------------------------------------------------------
  resolve:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
    outputs:
      pr:        ${{ steps.meta.outputs.pr }}
      head-sha:  ${{ steps.meta.outputs.head-sha }}
      base-sha:  ${{ steps.meta.outputs.base-sha }}
      go:        ${{ steps.meta.outputs.go }}
      cases:     ${{ steps.matrix.outputs.cases }}
    steps:
      - id: meta
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;

            prNumber = Number(context.payload.inputs.pr_number);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
            });
            const labelled = pr.labels.some(l => l.name === 'benchmark');
            core.setOutput('pr',       String(pr.number));
            core.setOutput('head-sha', pr.head.sha);
            core.setOutput('base-sha', pr.base.sha);
            core.setOutput('go',       labelled ? 'true' : 'false');
            if (!labelled) core.info(`PR #${pr.number} is not labelled 'benchmark' — skipping`);

      # Build the run-job matrix from the per-scenario checkboxes. The
      # native `matrix:` block is evaluated statically and can't read
      # workflow_dispatch inputs, so we emit JSON here and consume it
      # via fromJSON downstream. iterations + count are resolved here
      # too so the run job's `with:` block just reads matrix fields.
      - id: matrix
        uses: actions/github-script@v7
        env:
          BENCH_COUNT_VAR: ${{ vars.BENCH_COUNT }}
        with:
          script: |
            const inputs = context.payload.inputs;
            const mode = inputs.mode || 'full';
            const count = inputs.count || process.env.BENCH_COUNT_VAR || '10';
            const all = [
              { map: 'starwatcher-v1.0',  scenario: 'fightertest-bots',         full_iters: 5, key: 'fightertest_bots' },
              { map: 'starwatcher-v1.0',  scenario: 'fightertest-aircraft',     full_iters: 5, key: 'fightertest_aircraft' },
              { map: 'starwatcher-v1.0',  scenario: 'fightertest-tanks',        full_iters: 5, key: 'fightertest_tanks' },
              { map: 'starwatcher-v1.0',  scenario: 'fightertest-pathfinding',  full_iters: 5, key: 'fightertest_pathfinding' },
              { map: 'hellas-basin-v1.4', scenario: 'lategame1',                full_iters: 2, key: 'lategame1' },
            ];
            const selected = all
              .filter(c => inputs[c.key] !== 'false')
              .map(c => ({
                map: c.map,
                scenario: c.scenario,
                iterations: mode === 'quick' ? 1 : c.full_iters,
                count: parseInt(count, 10),
              }));
            if (selected.length === 0) {
              core.setFailed('no scenarios selected — tick at least one checkbox');
              return;
            }
            core.info(`matrix: ${JSON.stringify(selected)}`);
            core.setOutput('cases', JSON.stringify(selected));

  # ------------------------------------------------------------------
  # Run candidate + baseline in parallel across all scenarios. Each
  # matrix leg writes its report JSON as an artifact so the final job
  # can diff them.
  # ------------------------------------------------------------------
  run:
    needs: resolve
    if: needs.resolve.outputs.go == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        variant: [candidate, baseline]
        # Per-scenario rows are generated in `resolve` from the
        # workflow_dispatch checkboxes. Each row is fully resolved:
        # `{ map, scenario, iterations, count }`.
        case: ${{ fromJSON(needs.resolve.outputs.cases) }}
    steps:
      - name: Pick commit for this variant
        id: pick
        run: |
          if [ "${{ matrix.variant }}" = "candidate" ]; then
            echo "sha=${{ needs.resolve.outputs.head-sha }}" >> "$GITHUB_OUTPUT"
          else
            # echo "sha=${{ needs.resolve.outputs.base-sha }}" >> "$GITHUB_OUTPUT"
            # hardcode the baseline until this is committed to main BAR repo
            echo "sha=eb1c69f9036279d58b9e824234acbb34ece0560a" >> "$GITHUB_OUTPUT"
          fi

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.BENCHMARKS_IDENTITY_PROVIDER }}
          service_account: ${{ vars.BENCHMARKS_OPERATOR_SA }}

      - uses: bruno-dasilva/bar-benchmarks@master
        id: bench
        with:
          engine-commit:    ${{ steps.pick.outputs.sha }}
          bar-content:      ${{ vars.BENCH_BAR_CONTENT || 'bar-test-29871-90f4bc1' }}
          map:              ${{ matrix.case.map }}
          scenario:         ${{ matrix.case.scenario }}
          count:            ${{ matrix.case.count }}
          iterations:       ${{ matrix.case.iterations }}
          max-run-duration: 3600
          gcp-project:      ${{ vars.BENCHMARKS_GCP_PROJECT }}
          description:   "${{ matrix.variant }} PR#${{ needs.resolve.outputs.pr }} ${{ matrix.case.scenario }} @ ${{ steps.pick.outputs.sha }}"
          # Reuse prior results when the same (engine-commit, scenario,
          # map, count, machine-type) has already been benchmarked — the
          # baseline commit rarely changes, and re-running the same PR
          # head should short-circuit too.
          lookup-prior-results: "true"

      - name: Stash report for diff step
        run: |
          mkdir -p out
          CACHED="${{ steps.bench.outputs.prior-run-hit }}"
          if [ "${CACHED}" = "true" ]; then
            echo "::notice title=cache hit::${{ matrix.variant }} / ${{ matrix.case.scenario }} reused a prior run"
          fi
          # summary.json drives the candidate/baseline cells + footer.
          # wall_s_cum = per-VM cumulative engine wall (per-iter mean ×
          # iterations), the quantity the max-run-duration budget bounds.
          jq --arg variant  "${{ matrix.variant }}" \
             --arg scenario "${{ matrix.case.scenario }}" \
             --arg map      "${{ matrix.case.map }}" \
             --arg sha      "${{ steps.pick.outputs.sha }}" \
             --argjson cached "$( [ "${CACHED}" = "true" ] && echo true || echo false )" \
             --argjson iterations "${{ matrix.case.iterations }}" \
             '{variant: $variant, scenario: $scenario, map: $map, sha: $sha, cached: $cached, job_uid, mean: .sim_mean_ms_mean, wall_s_cum: (if .engine_wall_s_mean == null then null else .engine_wall_s_mean * $iterations end), valid, invalid, compute_usd}' \
            "${{ steps.bench.outputs.report-json-path }}" > "out/${{ matrix.variant }}-${{ matrix.case.scenario }}-summary.json"
          # Full BatchReport — fed to `bar-bench compare` in the comment
          # job for a BCa bootstrap CI on the per-VM trimmed-mean delta.
          cp "${{ steps.bench.outputs.report-json-path }}" \
            "out/${{ matrix.variant }}-${{ matrix.case.scenario }}-report.json"

      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.variant }}-${{ matrix.case.scenario }}
          path: out/*

  # ------------------------------------------------------------------
  # Diff candidate vs baseline across all scenarios and post a PR
  # comment with the mean±σ table and a 95% BCa bootstrap CI on the
  # relative delta of the per-VM trimmed mean (so reviewers can tell
  # real regressions from measurement noise; trim is 20% per side at
  # min(n) ≤ 20, else 10%).
  # ------------------------------------------------------------------
  comment:
    needs: [resolve, run]
    if: needs.resolve.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          path: reports
          merge-multiple: true

      # Set up the bar-benchmarks CLI so we can shell out to
      # `bar-bench compare` for a BCa bootstrap CI per scenario. Same
      # bootstrap (the harness one, not the statistical one) the
      # composite action uses internally.
      - uses: actions/checkout@v4
        with:
          repository: bruno-dasilva/bar-benchmarks
          ref: master
          path: bar-benchmarks-tool
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: bar-benchmarks-tool/uv.lock
      - name: uv sync bar-benchmarks
        working-directory: bar-benchmarks-tool
        run: uv sync --frozen

      - name: Compute BCa CI per scenario
        run: |
          set -euo pipefail
          mkdir -p comparisons
          # Derive the scenario list from artifacts that actually
          # landed, so deselected scenarios don't show up as warnings.
          for cand in reports/candidate-*-report.json; do
            [ -f "${cand}" ] || continue
            sc="${cand#reports/candidate-}"
            sc="${sc%-report.json}"
            base="reports/baseline-${sc}-report.json"
            if [ ! -f "${base}" ]; then
              echo "::warning::missing baseline report for ${sc} — skipping comparison"
              continue
            fi
            (cd bar-benchmarks-tool && uv run bar-bench compare \
              --candidate "${GITHUB_WORKSPACE}/${cand}" \
              --baseline  "${GITHUB_WORKSPACE}/${base}" \
              --output    "${GITHUB_WORKSPACE}/comparisons/${sc}.json")
          done

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Derive the scenario list from candidate summary files
            // that actually landed; deselected scenarios are absent.
            // Preserve a stable display order (fightertest-* group
            // first, lategame1 last) so the table doesn't reshuffle
            // run-to-run.
            const ORDER = [
              'fightertest-bots',
              'fightertest-aircraft',
              'fightertest-tanks',
              'fightertest-pathfinding',
              'lategame1',
            ];
            const present = new Set(
              fs.readdirSync('reports')
                .filter(f => f.startsWith('candidate-') && f.endsWith('-summary.json'))
                .map(f => f.slice('candidate-'.length, -'-summary.json'.length))
            );
            const scenarios = ORDER.filter(s => present.has(s));

            const load = (variant, scenario) => {
              const p = path.join('reports', `${variant}-${scenario}-summary.json`);
              if (!fs.existsSync(p)) return null;
              return JSON.parse(fs.readFileSync(p, 'utf8'));
            };

            const loadCmp = (scenario) => {
              const p = path.join('comparisons', `${scenario}.json`);
              if (!fs.existsSync(p)) return null;
              return JSON.parse(fs.readFileSync(p, 'utf8'));
            };

            const fmtCell = (stat, cached) => {
              if (stat == null) return "n/a";
              const core = `${Number(stat).toFixed(2)} ms`;
              // ♻️ = "this cell came from a prior, reused Batch run"
              return cached ? `${core} ♻️` : core;
            };
            // Per-VM cumulative engine wall (per-iter mean × iterations)
            // and valid iteration count, candidate leg only — the
            // baseline runs the same scenario at the same spec, so a
            // single number on each side is enough as a sanity gauge
            // against the max-run-duration budget.
            const fmtWall = (r) => {
              if (!r || r.wall_s_cum == null) return "n/a";
              return `~${Number(r.wall_s_cum).toFixed(0)}s`;
            };
            const fmtN = (r) => (r ? String(r.valid) : "—");
            // 95% CI on the relative candidate−baseline mean difference.
            // Each endpoint is colored individually: negative
            // (improvement, faster) = green, positive (regression,
            // slower) = red. A CI with both endpoints the same color
            // is a significant result; a mixed-color CI straddles 0
            // and is noise at 95% confidence.
            //
            // Escape gotcha: markdown processes the comment body before
            // KaTeX does, and CommonMark strips `\` before ASCII
            // punctuation like `%` — so `\%` in the source reaches
            // KaTeX as a bare `%`, which starts a LaTeX comment and
            // eats the closing brace ("missing close brace"). We emit
            // `\\%` in the markdown (→ `\%` post-markdown → literal `%`
            // in KaTeX), which in a JS string literal is `\\\\%`.
            const fmtCI = (cmp) => {
              if (!cmp || cmp.delta_pct_low == null || cmp.delta_pct_high == null) {
                return "n/a";
              }
              const colored = (x) => {
                const s = (x >= 0 ? "+" : "") + x.toFixed(2) + "\\\\%";
                const color = x > 0 ? "red" : x < 0 ? "green" : "gray";
                return `\\color{${color}}{${s}}`;
              };
              return `$${colored(cmp.delta_pct_low)} \\text{ to } ${colored(cmp.delta_pct_high)}$`;
            };

            const buildTable = () => {
              const lines = [
                `| scenario | candidate | baseline | Δ (95% CI) | n | engine wall |`,
                `|---|---|---|---|---|---|`,
              ];
              for (const sc of scenarios) {
                const c = load('candidate', sc);
                const b = load('baseline',  sc);
                const cmp = loadCmp(sc);
                const cStat = c ? c.mean : null;
                const bStat = b ? b.mean : null;
                lines.push(
                  `| ${sc} | ${fmtCell(cStat, c && c.cached)} | ${fmtCell(bStat, b && b.cached)} | ${fmtCI(cmp)} | ${fmtN(c)} | ${fmtWall(c)} |`
                );
              }
              return lines.join("\n");
            };

            // Pull a representative pair of SHAs for the header.
            let candSha = "", baseSha = "";
            for (const sc of scenarios) {
              const c = load('candidate', sc);
              const b = load('baseline',  sc);
              if (c) candSha = c.sha;
              if (b) baseSha = b.sha;
            }

            // Sum compute cost across all legs. Cached legs report $0
            // (bar-bench lookup zeroes compute_usd), so the total only
            // reflects fresh Batch runs. Legs whose cost is null (e.g.
            // unknown machine-type entry in the price table) are
            // ignored with a note.
            let totalUsd = 0, fresh = 0, cached = 0, unpriced = 0;
            for (const variant of ['candidate', 'baseline']) {
              for (const sc of scenarios) {
                const r = load(variant, sc);
                if (!r) continue;
                if (r.cached) cached++;
                else if (r.compute_usd == null) unpriced++;
                else { totalUsd += r.compute_usd; fresh++; }
              }
            }
            const costBits = [`$${totalUsd.toFixed(2)}`, `${fresh} fresh leg${fresh === 1 ? "" : "s"}`];
            if (cached) costBits.push(`${cached} cached at $0`);
            if (unpriced) costBits.push(`${unpriced} unpriced`);
            const costLine = `💰 compute cost: ${costBits.join(" · ")}`;

            // Hidden marker used to locate a prior bar-benchmark comment
            // on this PR so we update it in place instead of posting a
            // new one on every workflow re-trigger. HTML comments don't
            // render in markdown but are visible to listComments().
            const MARKER = "<!-- bar-benchmark:comment -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              MARKER,
              `### bar-benchmark — PR #${{ needs.resolve.outputs.pr }}`,
              ``,
              `candidate \`${candSha.slice(0,7)}\` vs baseline \`${baseSha.slice(0,7)}\``,
              ``,
              `#### sim mean (ms) with 95% CI on the relative delta`,
              buildTable(),
              ``,
              `<sub>${costLine}</sub>`,
              ``,
              `<sub>last updated: ${new Date().toISOString()} · [workflow run](${runUrl})</sub>`,
            ].join("\n");

            // Find-or-update: locate any prior bar-benchmark comment on
            // this PR via the hidden marker and mutate it in place.
            // Falls back to createComment on the very first run.
            const issueNumber = ${{ needs.resolve.outputs.pr }};
            const existing = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              },
            );
            const prior = existing.find(c => c.body && c.body.includes(MARKER));

            if (prior) {
              core.info(`updating existing comment ${prior.id}`);
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              core.info("no prior bar-benchmark comment found — creating a new one");
              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
