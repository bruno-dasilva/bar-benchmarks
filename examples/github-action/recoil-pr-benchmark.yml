# Drop this under .github/workflows/ in a consumer repo (e.g. RecoilEngine)
# to benchmark the head commit of every PR labelled `benchmark`.
#
# Prereqs in the consumer repo:
#   - Workload Identity Federation configured against the bar-experiments
#     GCP project. See docs/github-action.md for setup.
#   - Repo variables WIF_PROVIDER and BENCH_OPERATOR_SA populated with the
#     provider resource name and operator service-account email.

name: bar-benchmark

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  benchmark:
    if: github.event.label.name == 'benchmark' || contains(github.event.pull_request.labels.*.name, 'benchmark')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # for Workload Identity Federation
      pull-requests: write   # for the PR-comment step

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.BENCH_OPERATOR_SA }}

      - name: Run bar-benchmark
        id: bench
        uses: beyond-all-reason/bar-benchmarks@v1
        with:
          engine-commit: ${{ github.event.pull_request.head.sha }}
          bar-content: bar-test-29871-90f4bc1
          map: hellas-basin-v1.4
          scenario: lategame1
          count: 10
          gcp-project: bar-experiments
          description: "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}"

      - name: Comment results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fmt = (s) => s ? Number(s).toFixed(3) : "n/a";
            const body = [
              "**bar-benchmark**",
              "",
              `- mean: **${fmt('${{ steps.bench.outputs.mean-ms }}')} ms**  `,
              `- p95:  ${fmt('${{ steps.bench.outputs.p95-ms }}')} ms  `,
              `- median: ${fmt('${{ steps.bench.outputs.median-ms }}')} ms  `,
              `- pooled stddev: ${fmt('${{ steps.bench.outputs.stddev-ms }}')} ms  `,
              `- valid / invalid VMs: ${{ steps.bench.outputs.valid-count }} / ${{ steps.bench.outputs.invalid-count }}`,
              "",
              `[Results in GCS](https://console.cloud.google.com/storage/browser/${'${{ steps.bench.outputs.results-gcs-uri }}'.replace(/^gs:\\/\\//, '')})`,
            ].join("\n");
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
