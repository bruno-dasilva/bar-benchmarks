# Artifact catalog. Source of truth for every artifact (engine,
# bar-content, map) that gets staged to the artifacts bucket. Consumed by
# src/bar_benchmarks/orchestrator/catalog.py.
#
# Names inside a section are CLI handles: pass them verbatim to
# `bar-bench run --engine NAME --bar-content NAME --map NAME`. The
# orchestrator looks up the entry, checks whether the bucket already has
# the blob at `dest`, and only builds + uploads on a miss. Adding a new
# artifact = add an entry here.
#
# Entry shape (always a TOML table now):
#   engine.<name>       dest = "gs://...", commit = "<git SHA>"
#   bar_content.<name>  dest = "gs://...", version = "Beyond All Reason [test-]<build>-<sha>"
#   map.<name>          dest = "gs://...", [source = "https://..."]
#
# `commit` is forwarded to scripts/build-engine.sh --commit on miss.
# `version` is forwarded to scripts/build-bar-content.sh --version on miss.
# `source` (maps only) is fetched with curl on miss.
#
# The map entry's dest URI basename becomes the on-disk filename (the runner
# reads map_filename from the synthesized manifest, see
# src/bar_benchmarks/task/runner.py).
#
# Overlay and startscript are not catalog-resolved — they live as files
# under benchmarks/<scenario>/ and are selected by `--scenario NAME`.

